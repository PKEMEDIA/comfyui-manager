[default]
# PKEMEDIA Studio Hardened Configuration for Pretty Kitty Media Production
# Optimized for reliable installs, security, speed (uv), and media workflow nodes

security_level = strong
use_uv = true
allow_git_url_install = false
allow_pip_install = false
network_mode = private
file_logging = true
model_download_by_agent = true

# Preload PKEMEDIA curated media production channel
channels = pkemedia-media,default

# Additional production tweaks
pip_overrides = pip_overrides.json
blacklist = blacklist.txt

# Notes for studio use:
# - Copy this to your ComfyUI user dir or __manager__ folder
# - Adjust security_level if needed for trusted nodes
# - Set allow_git_url_install=true only for vetted custom repos